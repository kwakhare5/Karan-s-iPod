name: Keep Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *' # Run every 14 minutes to prevent Render sleep (15 min timeout)
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -s https://karan-ipod-backend.onrender.com/api/ping
